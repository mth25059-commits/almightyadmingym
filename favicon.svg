<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a0808" />
      <stop offset="100%" stop-color="#080808" />
    </radialGradient>
    <linearGradient id="primaryRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff3e3e" />
      <stop offset="100%" stop-color="#a93226" />
    </linearGradient>
    <linearGradient id="metalSilver" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="50%" stop-color="#a8a8a8" />
      <stop offset="100%" stop-color="#5c5c5c" />
    </linearGradient>
  </defs>
  
  <circle cx="256" cy="256" r="240" fill="url(#bgGlow)" stroke="url(#primaryRed)" stroke-width="16" />
  
  <!-- Dumbbell Handle -->
  <rect x="120" y="236" width="272" height="40" rx="10" fill="url(#metalSilver)" stroke="#000" stroke-width="4" />
  
  <!-- Dumbbell Weights Left -->
  <rect x="100" y="156" width="30" height="200" rx="8" fill="url(#primaryRed)" stroke="#000" stroke-width="4" />
  <rect x="70" y="116" width="30" height="280" rx="12" fill="url(#primaryRed)" stroke="#000" stroke-width="4" />
  
  <!-- Dumbbell Weights Right -->
  <rect x="382" y="156" width="30" height="200" rx="8" fill="url(#primaryRed)" stroke="#000" stroke-width="4" />
  <rect x="412" y="116" width="30" height="280" rx="12" fill="url(#primaryRed)" stroke="#000" stroke-width="4" />
  
  <!-- Inner ring decoration -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="rgba(255, 62, 62, 0.2)" stroke-width="4" stroke-dasharray="10 15" />
</svg>
